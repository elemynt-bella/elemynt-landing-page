
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <script>
        // Chrome ignores prefers-color-scheme inside SVG favicons, so swap the
        // file via matchMedia: white mark on dark tabs, dark mark on light tabs.
        (function () {
          var mq = window.matchMedia("(prefers-color-scheme: dark)");
          var link = document.getElementById("favicon");
          function apply() {
            link.href = mq.matches ? "/favicon-dark.svg" : "/favicon.svg";
          }
          apply();
          mq.addEventListener("change", apply);
        })();
      </script>
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Elemynt</title>
      <meta name="description" content="Create modern landing pages with dynamic backgrounds and subtle animations, enhancing user engagement and visual appeal for businesses and marketers." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
