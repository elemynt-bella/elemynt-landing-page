name: Deploy staging (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # withastro/action auto-detects pnpm, installs deps, builds, and uploads
      # the Pages artifact. DEPLOY_TARGET=staging => base: '/elemynt-landing-page/'.
      - uses: withastro/action@v6
        with:
          node-version: 26
        env:
          DEPLOY_TARGET: staging

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
